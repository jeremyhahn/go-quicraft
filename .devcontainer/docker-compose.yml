services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    image: go-quicraft-dev:latest
    volumes:
      - ../:/app
    working_dir: /app
    network_mode: host
    cap_add:
      - NET_ADMIN

  integration:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: go-quicraft-integration:latest
    volumes:
      - ../:/app
    working_dir: /app
    network_mode: host
    cap_add:
      - NET_ADMIN
    command: ["make", "_integration-test"]
