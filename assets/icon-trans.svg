<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="224" height="224" viewBox="48 48 224 224" role="img" aria-labelledby="title desc">
  <title id="title">QuicRaft transparent icon</title>
  <desc id="desc">The QuicRaft symbol with no background fill, suitable for transparent use.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10243c"/>
      <stop offset="55%" stop-color="#153e63"/>
      <stop offset="100%" stop-color="#0b1729"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7de7ff"/>
      <stop offset="100%" stop-color="#33c7d8"/>
    </linearGradient>
    <linearGradient id="raft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd77a"/>
      <stop offset="100%" stop-color="#f39a3f"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#99f3ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#99f3ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#99f3ff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#06101d" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="48" y="48" width="224" height="224" rx="52" fill="url(#panel)"/>

    <path d="M160 96
             a64 64 0 1 1 -0.01 0"
          fill="none"
          stroke="url(#ring)"
          stroke-width="16"
          stroke-linecap="round"
          stroke-dasharray="320 56"/>

    <path d="M197 188
             q18 10 29 28"
          fill="none"
          stroke="url(#ring)"
          stroke-width="12"
          stroke-linecap="round"/>

    <circle cx="160" cy="96" r="11" fill="#c8fbff"/>
    <circle cx="223" cy="206" r="11" fill="#c8fbff"/>
    <circle cx="97" cy="206" r="11" fill="#c8fbff"/>

    <path d="M92 180
             C114 165 133 160 160 160
             C187 160 206 165 228 180"
          fill="none"
          stroke="url(#wave)"
          stroke-width="8"
          stroke-linecap="round"/>
    <path d="M84 194
             C111 178 132 174 160 174
             C188 174 209 178 236 194"
          fill="none"
          stroke="url(#wave)"
          stroke-width="8"
          stroke-linecap="round"/>
    <path d="M96 208
             C120 196 139 192 160 192
             C181 192 200 196 224 208"
          fill="none"
          stroke="url(#wave)"
          stroke-width="8"
          stroke-linecap="round"/>

    <g fill="url(#raft)">
      <rect x="112" y="126" width="96" height="14" rx="7"/>
      <rect x="104" y="142" width="112" height="14" rx="7"/>
      <rect x="116" y="158" width="88" height="14" rx="7"/>
      <path d="M154 112
               l22 0
               l16 22
               l-54 0
               z"/>
    </g>
  </g>
</svg>
